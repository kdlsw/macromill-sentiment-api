version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: macromill/sentiment-api-gpu:latest
    container_name: macromill-sentiment-api-gpu
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    # GPU configuration for NVIDIA Container Toolkit
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
